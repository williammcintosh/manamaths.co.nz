  - \item Fill in the blank: $6a+18=6(\square)$.
  - \item Fill in the blank: $12x-8=4(\square)$.
  - \item Is $8y+24=8(y+3)$ correct?
  - \item Is $10m+15=5(2m+3)$ correct?
  - \item Which has the greater common factor: $12p+18$ or $12p+20$?
