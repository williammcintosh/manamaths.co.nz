year_level: 9
learning_objective:
- id: L20
  topic: Factorising single brackets
  slug: lo-yr9-factorising-single-brackets
  instruction: Factorise each expression into a single bracket.
  terminology:
  - factorise
  - common factor
  - bracket
  - term
  - coefficient
  skills:
  - find the highest common factor of algebraic terms
  - take a common factor outside a single bracket
  - check a factorised form by expanding it back out
  - compare equivalent factorised forms
  question_types:
  - direct factorising
  - common factor
  - missing value
  - error check
  - comparison
  - short reasoning
