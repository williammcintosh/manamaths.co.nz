id: L08
topic: Dividing fractions
slug: lo-yr9-dividing-fractions
instruction: Divide each fraction. Simplify where you can.
terminology:
  - reciprocal
  - divide
  - numerator
  - denominator
  - simplify
skills:
  - divide fractions by multiplying by the reciprocal
  - divide whole numbers by fractions
  - divide fractions by whole numbers
  - simplify answers after division
  - check whether an answer is sensible
