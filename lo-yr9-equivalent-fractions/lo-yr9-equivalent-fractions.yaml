year_level: 9
learning_objective:
  id: L02
  topic: Equivalent fractions
  instruction: Find or identify fractions that are equivalent.
  terminology:
    - equivalent
    - fraction
    - numerator
    - denominator
    - simplify
    - scale factor
  skills:
    - identify equivalent fractions
    - generate equivalent fractions
    - complete missing-value equivalents
    - justify whether two fractions are equivalent
  question_types:
    - matching pairs
    - missing value
    - simplify and compare
    - visual fraction models
    - true or false
  foundation_questions:
    - \item Write a fraction equivalent to $\frac{1}{2}$.
    - \item Write a fraction equivalent to $\frac{2}{3}$.
    - \item Write a fraction equivalent to $\frac{3}{4}$.
    - \item Write a fraction equivalent to $\frac{4}{5}$.
    - \item Write a fraction equivalent to $\frac{2}{5}$.
    - \item Are $\frac{1}{2}$ and $\frac{2}{4}$ equivalent?
    - \item Are $\frac{3}{5}$ and $\frac{6}{10}$ equivalent?
    - \item Are $\frac{2}{3}$ and $\frac{4}{8}$ equivalent?
    - \item Fill in the blank: $\frac{1}{3} = \frac{\square}{6}$
    - \item Fill in the blank: $\frac{2}{5} = \frac{\square}{10}$
    - \item Fill in the blank: $\frac{3}{4} = \frac{\square}{8}$
    - \item Fill in the blank: $\frac{4}{7} = \frac{8}{\square}$
    - |
      \item {
      \begin{tikzpicture}[scale=0.9]
      \draw (0,0) circle (1.1);
      \draw (0,0)--(90:1.1);
      \draw (0,0)--(180:1.1);
      \draw (0,0)--(270:1.1);
      \draw (0,0)--(0:1.1);
      \fill[blue!25] (0,0)--(90:1.1) arc (90:180:1.1)--cycle;
      \fill[blue!25] (0,0)--(180:1.1) arc (180:270:1.1)--cycle;
      \end{tikzpicture}
      }
    - |
      \item {
      \begin{tikzpicture}[scale=0.9]
      \draw (0,0) rectangle (4,1);
      \foreach \x in {1,2,3} \draw (\x,0)--(\x,1);
      \foreach \x in {0,0.5,...,4} \draw (\x,0)--(\x,1);
      \fill[green!25] (0,0) rectangle (2,1);
      \end{tikzpicture}
      }
  proficient_questions:
    - \item Write two different fractions equivalent to $\frac{3}{5}$.
    - \item Write two different fractions equivalent to $\frac{4}{7}$.
    - \item Fill in the blank: $\frac{5}{6} = \frac{\square}{18}$
    - \item Fill in the blank: $\frac{7}{8} = \frac{21}{\square}$
    - \item Fill in the blank: $\frac{9}{10} = \frac{\square}{50}$
    - \item Are $\frac{6}{9}$ and $\frac{10}{15}$ equivalent?
    - \item Are $\frac{8}{12}$ and $\frac{2}{3}$ equivalent?
    - \item Are $\frac{12}{18}$ and $\frac{3}{4}$ equivalent?
    - \item Which fraction is equivalent to $\frac{2}{3}$: $\frac{6}{9}$, $\frac{4}{9}$, or $\frac{8}{15}$?
    - \item Which fraction is equivalent to $\frac{3}{4}$: $\frac{9}{12}$, $\frac{6}{10}$, or $\frac{12}{20}$?
    - \item Simplify $\frac{12}{16}$ and state a fraction equivalent to it.
    - \item Simplify $\frac{15}{20}$ and state a fraction equivalent to it.
  excellence_questions:
    - \item Explain whether $\frac{14}{21}$ and $\frac{2}{3}$ are equivalent.
    - \item Explain whether $\frac{18}{24}$ and $\frac{3}{5}$ are equivalent.
    - \item One fraction is $\frac{3}{4}$. Write three different equivalent fractions.
    - \item One fraction is $\frac{5}{8}$. Write three different equivalent fractions.
    - \item Fill in both blanks: $\frac{\square}{12} = \frac{3}{4} = \frac{21}{\square}$
    - \item Fill in both blanks: $\frac{\square}{18} = \frac{2}{3} = \frac{16}{\square}$
    - \item A student says $\frac{4}{6}$ and $\frac{8}{10}$ are equivalent because both numbers doubled. Are they correct?
    - \item A student says $\frac{3}{9}$ and $\frac{4}{12}$ are equivalent. Are they correct?
    - \item Shade a diagram to show a fraction equivalent to $\frac{2}{5}$.
    - \item Shade a diagram to show a fraction equivalent to $\frac{3}{4}$.
    - \item Complete: if $\frac{a}{b} = \frac{12}{20}$, then a simpler equivalent fraction is \rule{2cm}{0.15mm}.
    - \item Complete: if $\frac{m}{n} = \frac{18}{30}$, then a simpler equivalent fraction is \rule{2cm}{0.15mm}.
    - \item Which does not belong: $\frac{1}{2}$, $\frac{2}{4}$, $\frac{3}{6}$, $\frac{4}{10}$?
    - \item Which does not belong: $\frac{2}{3}$, $\frac{4}{6}$, $\frac{6}{9}$, $\frac{8}{15}$?
    - \item Write a real-life example that could be represented by two equivalent fractions.
    - \item Write your own pair of equivalent fractions and explain how you know.
