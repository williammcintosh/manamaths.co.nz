year_level: 9
learning_objective:
  id: L02
  topic: Equivalent fractions
  instruction: Find or identify fractions that are equivalent.
  terminology:
    - equivalent
    - fraction
    - numerator
    - denominator
    - simplify
    - scale factor
  skills:
    - identify equivalent fractions
    - generate equivalent fractions
    - complete missing-value equivalents
    - justify whether two fractions are equivalent
  question_types:
    - matching pairs
    - missing value
    - simplify and compare
    - visual fraction models
    - true or false
  foundation_questions:
    - \item Write a fraction equivalent to $\frac{1}{2}$.
    - \item Write a fraction equivalent to $\frac{2}{3}$.
    - \item Write a fraction equivalent to $\frac{3}{4}$.
    - \item Write a fraction equivalent to $\frac{4}{5}$.
    - \item Write a fraction equivalent to $\frac{2}{5}$.
    - \item Are $\frac{1}{2}$ and $\frac{2}{4}$ equivalent?
    - \item Are $\frac{3}{5}$ and $\frac{6}{10}$ equivalent?
    - \item Are $\frac{2}{3}$ and $\frac{4}{8}$ equivalent?
    - \item Fill in the blank: $\frac{1}{3} = \frac{\square}{6}$.
    - \item Fill in the blank: $\frac{2}{5} = \frac{\square}{10}$.
    - \item Fill in the blank: $\frac{3}{4} = \frac{\square}{8}$.
    - \item Fill in the blank: $\frac{4}{7} = \frac{8}{\square}$.
    - \item Write a fraction equivalent to $\frac{5}{6}$.
    - \item Are $\frac{2}{8}$ and $\frac{1}{4}$ equivalent?
    - \item Fill in the blank: $\frac{3}{5} = \frac{12}{\square}$.
    - \item Write a fraction equivalent to $\frac{6}{7}$.
    - \item Are $\frac{4}{6}$ and $\frac{2}{3}$ equivalent?
    - \item Fill in the blank: $\frac{5}{8} = \frac{10}{\square}$.
    - \item Write a fraction equivalent to $\frac{7}{10}$.
    - |
      \item {.
      \begin{tikzpicture}[scale=0.9]
      \draw (0,0) circle (1.1);
      \draw (0,0)--(90:1.1);
      \draw (0,0)--(180:1.1);
      \draw (0,0)--(270:1.1);
      \draw (0,0)--(0:1.1);
      \fill[blue!25] (0,0)--(90:1.1) arc (90:180:1.1)--cycle;
      \fill[blue!25] (0,0)--(180:1.1) arc (180:270:1.1)--cycle;
      \end{tikzpicture}
      }
